<!DOCTYPE html>
<html>
<head>
    <title>Incident Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #eef2f7;
            margin: 0;
        }

        header {
            background: #1e293b;
            color: white;
            padding: 20px;
            font-size: 24px;
        }

        .container {
            padding: 30px;
            max-width: 900px;
            margin: auto;
        }

        .form-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        input, select {
            padding: 10px;
            margin: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn-create { background: #2563eb; color: white; }
        .btn-resolve { background: #16a34a; color: white; }
        .btn-delete { background: #dc2626; color: white; }

        .card {
            background: white;
            padding: 15px;
            margin: 15px 0;
            border-radius: 10px;
            border-left: 6px solid red;
            box-shadow: 0 4px 8px rgba(0,0,0,0.08);
        }

        .sev2 { border-left-color: orange; }
        .sev3 { border-left-color: green; }

        .title { font-weight: 600; }
        .meta { color: #555; }

        .badge {
            padding: 4px 8px;
            border-radius: 5px;
            font-size: 12px;
            color: white;
            margin-left: 10px;
        }

        .open { background: #2563eb; }
        .investigating { background: #f59e0b; }
        .resolved { background: #16a34a; }

        .dark {
            background: #0f172a;
            color: white;
        }

        .dark .card, .dark .form-box {
            background: #1e293b;
            color: white;
        }
    </style>
</head>

<body>

<header>
    🚨 Incident Management System
</header>

<div class="container">

    <!-- CREATE FORM -->
    <div class="form-box">
        <h3>Create Incident</h3>
        <form id="incidentForm">
            <input type="text" id="service" placeholder="Service Name" required>
            <input type="text" id="severity" placeholder="SEV1/SEV2/SEV3" required>
            <input type="text" id="description" placeholder="Description" required>
            <button class="btn-create" type="submit">Create</button>
        </form>
    </div>

    <!-- FILTERS -->
    <div style="margin-bottom:20px;">
        <input type="text" id="search" placeholder="🔍 Search service..." />

        <select id="severityFilter">
            <option value="">All Severity</option>
            <option value="SEV1">SEV1</option>
            <option value="SEV2">SEV2</option>
            <option value="SEV3">SEV3</option>
        </select>

        <select id="statusFilter">
            <option value="">All Status</option>
            <option value="Open">Open</option>
            <option value="Investigating">Investigating</option>
            <option value="Resolved">Resolved</option>
        </select>

        <button onclick="toggleDarkMode()">🌙 Dark Mode</button>
    </div>

    <!-- INCIDENT LIST -->
    <div id="incidents"></div>

</div>

<script>
let allData = [];

fetch("/incidents")
.then(res => res.json())
.then(data => {
    allData = data;
    renderData(data);
});

function renderData(data) {
    let container = document.getElementById("incidents");
    container.innerHTML = "";

    data.forEach(i => {
        let div = document.createElement("div");
        div.className = "card " + i.severity.toLowerCase();

        div.innerHTML = `
            <div class="title">${i.id} - ${i.service}</div>
            <div class="meta">
                Severity: ${i.severity}
                <span class="badge ${i.status.toLowerCase()}">${i.status}</span>
            </div>
            <div class="meta">${i.description}</div>

            <div style="margin-top:10px;">
                <button class="btn-resolve" onclick="markResolved('${i.id}')">Resolve</button>
                <button class="btn-delete" onclick="deleteIncident('${i.id}')">Delete</button>
            </div>
        `;

        container.appendChild(div);
    });
}

// FILTER
document.getElementById("search").addEventListener("input", filterData);
document.getElementById("severityFilter").addEventListener("change", filterData);
document.getElementById("statusFilter").addEventListener("change", filterData);

function filterData() {
    let search = document.getElementById("search").value.toLowerCase();
    let sev = document.getElementById("severityFilter").value;
    let status = document.getElementById("statusFilter").value;

    let filtered = allData.filter(i =>
        i.service.toLowerCase().includes(search) &&
        (sev === "" || i.severity === sev) &&
        (status === "" || i.status === status)
    );

    renderData(filtered);
}

// CREATE
document.getElementById("incidentForm").addEventListener("submit", function(e) {
    e.preventDefault();

    fetch("/incidents", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            service: service.value,
            severity: severity.value,
            description: description.value
        })
    }).then(() => location.reload());
});

// UPDATE
function markResolved(id) {
    fetch(`/incidents/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ status: "Resolved" })
    }).then(() => location.reload());
}

// DELETE
function deleteIncident(id) {
    fetch(`/incidents/${id}`, {
        method: "DELETE"
    }).then(() => location.reload());
}

// DARK MODE
function toggleDarkMode() {
    document.body.classList.toggle("dark");
}
</script>

</body>
</html>
